<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Yomu</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .logo {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .message {
            color: #333;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #e74c3c;
            background: #fee;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .success {
            color: #27ae60;
            background: #efe;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Yomu</div>
        <div id="content">
            <div class="spinner"></div>
            <p class="message">Redirecting to the app...</p>
        </div>
    </div>

    <script>
        function getQueryParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                userId: params.get('userId'),
                secret: params.get('secret'),
                expire: params.get('expire')
            };
        }

        function redirect() {
            const params = getQueryParams();
            const content = document.getElementById('content');

            if (!params.userId || !params.secret) {
                content.innerHTML = `
                    <div class="error">
                        Invalid reset link. Missing required parameters.
                    </div>
                    <p class="message">Please request a new password reset link.</p>
                `;
                return;
            }

            const deepLink = `yomu://auth/reset-password?userId=${encodeURIComponent(params.userId)}&secret=${encodeURIComponent(params.secret)}&expire=${encodeURIComponent(params.expire || '')}`;
            
            // Try to open the deep link
            const startTime = Date.now();
            
            // Attempt to open the deep link
            window.location.href = deepLink;
            
            // Fallback: if the app doesn't open within 2 seconds, show a manual link
            setTimeout(() => {
                if (Date.now() - startTime < 2000) return; // Already redirected
                
                content.innerHTML = `
                    <div class="success">
                        If the app doesn't open automatically, click the button below:
                    </div>
                    <a href="${deepLink}" class="button">Open Yomu App</a>
                    <p class="message" style="margin-top: 20px; font-size: 14px; color: #666;">
                        Make sure you have the Yomu app installed on your device.
                    </p>
                `;
            }, 2000);
        }

        // Redirect after a short delay
        setTimeout(redirect, 500);
    </script>
</body>
</html>
